```html
<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Transfer Sewa DAFF PRODUCTION</title>

<style>

*{
box-sizing:border-box;
}

body{

font-family:Poppins, sans-serif;
background:#f1f5f9;
margin:0;
padding:15px;

display:flex;
justify-content:center;
align-items:center;
min-height:100vh;

}


/* CONTAINER */

.container{

width:100%;
max-width:500px;

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,0.1);

}


/* TITLE */

h3{

text-align:center;
margin-bottom:20px;

}


/* INPUT */

input{

width:100%;

padding:14px;

margin-top:10px;

border-radius:8px;

border:1px solid #ccc;

font-size:16px;

}


/* BUTTON */

button{

margin-top:15px;

padding:14px;

width:100%;

border:none;

border-radius:8px;

background:#2563eb;

color:white;

font-size:16px;

cursor:pointer;

}

button:hover{

background:#1d4ed8;

}


/* KONFIRMASI */

.konfirmasi{

display:none;

background:#fff3cd;

padding:15px;

margin-top:20px;

border-radius:10px;

font-size:15px;

}


/* BUKTI */

.bukti{

display:none;

background:#d1e7dd;

padding:15px;

margin-top:20px;

border-radius:10px;

}


.struk{

background:white;

padding:15px;

border-radius:10px;

margin-top:10px;

border:1px solid #ccc;

font-size:15px;

}


/* MOBILE */

@media(max-width:600px){

.container{

padding:20px;

border-radius:12px;

}

h3{

font-size:18px;

}

input{

font-size:16px;

padding:12px;

}

button{

font-size:16px;

padding:12px;

}

}


/* DESKTOP BESAR */

@media(min-width:1000px){

.container{

max-width:450px;

}

}


</style>
</head>
<body>


<div class="container">

<h3>Transfer ke DAFF PRODUCTION</h3>

<input id="jumlah" placeholder="Jumlah Transfer">

<input id="nama" placeholder="Nama Anda (Pengirim)">

<input id="rek" placeholder="Nomor Rekening Anda">


<button onclick="cekData()">

Transfer

</button>



<div class="konfirmasi" id="konfirmasi">

<h4>Konfirmasi Transfer</h4>

<p id="textKonfirmasi"></p>

<button onclick="prosesTransfer()">

Ya, Transfer

</button>

<button onclick="batal()">

Batal

</button>

</div>



<div class="bukti" id="bukti">

<h3>Bukti Transfer</h3>

<div class="struk">

<p id="tanggal"></p>

<p id="buktiPengirim"></p>

<p>Penerima: DAFF PRODUCTION</p>

<p id="buktiJumlah"></p>

<p id="ref"></p>

<p>Status: BERHASIL</p>

</div>

</div>


</div>



<script>

var jumlah,nama,rek;

function cekData(){

jumlah =
document.getElementById("jumlah").value;

nama =
document.getElementById("nama").value;

rek =
document.getElementById("rek").value;


document.getElementById("konfirmasi")
.style.display="block";


document.getElementById("textKonfirmasi")
.innerHTML=

"Anda akan transfer Rp "+jumlah+

"<br><br>Dari: "+nama+

"<br>Rekening: "+rek+

"<br><br>Ke: DAFF PRODUCTION"+

"<br><br>Apakah sudah benar?";

}



function batal(){

document.getElementById("konfirmasi")
.style.display="none";

}



function prosesTransfer(){

document.getElementById("konfirmasi")
.style.display="none";

document.getElementById("bukti")
.style.display="block";


var tgl = new Date();


document.getElementById("tanggal")
.innerHTML="Tanggal: "+tgl.toLocaleString();


document.getElementById("buktiPengirim")
.innerHTML="Pengirim: "+nama;


document.getElementById("buktiJumlah")
.innerHTML="Jumlah: Rp "+jumlah;


document.getElementById("ref")
.innerHTML=

"Ref: TRX"+Math.floor(Math.random()*99999999);


}


</script>


</body>
</html>
```
